name: CST Brands
description: >-
  CST Brands was an independent retailer of motor fuels and convenience
  merchandise headquartered in San Antonio, Texas, operating under the Corner
  Store and other brands. CST Brands was acquired by Alimentation Couche-Tard
  in 2017 and integrated into the Circle K convenience store network. The
  company does not currently expose a public developer API; this repository
  exists for historical reference and to track any future API artifacts.
